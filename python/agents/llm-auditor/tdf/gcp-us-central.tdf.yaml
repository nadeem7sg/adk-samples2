apiVersion: tdf.7sg.ai/v1
kind: TargetDefinition
metadata:
  name: llm-auditor-gcp-us-central
  displayName: GCP US Central - Cloud Run + Vertex AI
  description: >
    GCP target for the LLM Auditor agent. Cloud Run for serverless
    container hosting, Vertex AI for Gemini model access, and Secret
    Manager for credential storage.
  version: "1.0.0"
  tags:
    provider: gcp
    geo: us
    tier: native
target:
  provider: gcp
  regions:
    - us-central1
  geography:
    continent: na
    country: us
    metro: iowa
  networking:
    defaultNetworkPolicy: public
  services:
    - name: cloud-run
      type: serverless
      providerService: Cloud Run
      defaults:
        project: gen-lang-client-0373235205
        namespace: default
      capabilities:
        supportsOIDCWorkloadIdentity: true
        supportsPrivateEndpoints: true
      quotas:
        maxCPUCores: 8
        maxMemoryGiB: 32
    - name: vertex-ai
      type: ml-platform
      providerService: Vertex AI (Gemini)
      endpoints:
        api: https://us-central1-aiplatform.googleapis.com
      capabilities:
        supportsOIDCWorkloadIdentity: true
      availability:
        slaTier: standard
        supportedRegions:
          - us-central1
          - us-east1
          - europe-west1
    - name: secret-manager
      type: secrets
      providerService: Secret Manager
      capabilities:
        supportsPrivateEndpoints: true
    - name: artifact-registry
      type: custom
      providerService: Artifact Registry
      defaults:
        project: gen-lang-client-0373235205
      endpoints:
        registry: us-central1-docker.pkg.dev
    - name: cloud-logging
      type: observability
      providerService: Cloud Logging + Cloud Monitoring
    - name: iam
      type: identity
      providerService: IAM + Workload Identity
  infrastructure:
    clusters: []
    secretStores:
      - name: gcp-secret-manager
        service: secret-manager
    deployCredentials:
      provider: gcp
      secretRef: deploy-service-account-key
      serviceAccountEmail: sherpa-orchestrator@gen-lang-client-0373235205.iam.gserviceaccount.com
