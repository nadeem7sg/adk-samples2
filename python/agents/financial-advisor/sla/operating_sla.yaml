# Operating SLA — financial-advisor (ADK sample)
#
# Sole normative reference for structure and metrics:
#   Profilingconfluence.MD — "AI-Enabled Application: Run, Scale & Operate Metrics Framework"
# Section numbers below refer to that document only.
#
# Service-level objectives for the multi-agent financial advisory coordinator: market
# research (search-heavy), strategy design, execution planning, and risk analysis.
# Educational use only per README disclaimer. See financial_advisor/. Adjust targets per environment.
#
version: 1

# Machine-readable SLO contract consumed by Sherpa's profile_sla_evaluator.
# Heavy multi-agent system (4 sub-agents: data/trading/risk/execution).
# Not yet profiled; standard heavy-agent SLO with generous headroom.
slos:
  latency:
    p50_ms: 60000
    p95_ms: 200000
    p99_ms: 300000
  ttft:
    p95_ms: null
  reliability:
    success_rate_min_pct: 80.0
    error_rate_max_pct: 20.0
    retry_rate_max_pct: 10.0
  cost:
    max_cost_per_transaction_usd: 3.00
  cache:
    hit_rate_min_pct: 0.0

reference:
  title: "AI-Enabled Application: Run, Scale & Operate Metrics Framework"
  source_document: "Profilingconfluence.MD"

# ---------------------------------------------------------------------------
# §19 Key design principles (non-numeric; enforced by how SLOs are interpreted)
# ---------------------------------------------------------------------------
design_principles:
  measure_outcomes_not_only_activity: true
  attribute_cost_at_lowest_useful_level: true
  separate_successful_and_failed_work: true
  track_tail_latency_over_average: true
  evaluate_quality_and_cost_together: true
  governance_as_production_gate: true

# ---------------------------------------------------------------------------
# §1 Executive summary — categories this agent must support in telemetry
# ---------------------------------------------------------------------------
executive_metric_categories:
  - unit_economics
  - ai_usage
  - data
  - sla_slo_latency
  - reliability
  - quality
  - scale
  - infrastructure
  - operations
  - governance
  - business_margin

# ---------------------------------------------------------------------------
# §2 Recommended north star — quantitative SLO hooks
# ---------------------------------------------------------------------------
north_star:
  cost_per_successful_outcome_usd:
    max: null
    description: "Total application cost / successful completed outcomes (§2, §3)."
  cost_per_correct_or_accepted_answer_usd:
    max: null
    description: "Total cost / accepted or verified correct answers (§2, §10)."
  gross_margin_per_ai_transaction_usd:
    min: null
    description: "Revenue per transaction minus cost per transaction (§2)."
  p95_p99_latency_under_target_concurrency:
    p95_ms_max: null
    p99_ms_max: null
    rationale: "§2, §6, §18 — set thresholds per product and concurrency model."
  workflow_success_rate_under_production_load:
    pct_min: null
    rationale: "§2, §9, §18 — set minimum success rate under production load (framework gives no default %)."

# ---------------------------------------------------------------------------
# §3 Unit economics
# ---------------------------------------------------------------------------
unit_economics:
  max_cost_per_transaction_usd: null
  max_cost_per_user_session_usd: null
  max_cost_per_workflow_usd: null
  max_cost_per_successful_outcome_usd: null
  max_cost_per_correct_answer_usd: null
  report_cost_per_customer_or_tenant: true
  report_gross_margin_per_transaction: true
  report_cost_per_environment: true

# ---------------------------------------------------------------------------
# §4 Token & model usage
# ---------------------------------------------------------------------------
token_and_model:
  report_input_tokens_per_transaction: true
  report_output_tokens_per_transaction: true
  report_total_tokens_per_transaction: true
  report_tokens_per_successful_workflow: true
  report_tokens_per_failed_workflow: true
  report_model_calls_per_transaction: true
  report_model_calls_per_workflow: true
  report_tool_calls_per_transaction: true
  report_retry_tokens: true
  report_cache_hit_rate: true
  max_model_calls_per_advisory_session: null
  max_tool_calls_per_advisory_session: null

# ---------------------------------------------------------------------------
# §5 Data access, storage & retrieval — heavy Google Search (SEC filings, market intel);
# track retrieval volume, freshness, and cost per ticker/session.
# ---------------------------------------------------------------------------
data_access:
  report_gb_accessed_per_transaction: true
  report_documents_or_chunks_retrieved_per_transaction: true
  report_vector_db_queries_per_transaction: true
  report_data_egress_cost_attribution: true
  retrieval_success_rate_pct_min: null
  retrieval_success_rate_rationale: "§18 — set minimum retrieval success rate when retrieval is used."

# ---------------------------------------------------------------------------
# §6 Latency & SLA/SLO — report percentiles and decomposition (§6); numeric
# latency SLOs are product-defined ("under defined threshold", §18); see
# recommended_slo_examples for illustration only.
# ---------------------------------------------------------------------------
latency:
  report_p50: true
  report_p90: true
  report_p95: true
  report_p99: true
  p95_ms_max: null
  p99_ms_max: null
  ttft_p95_ms_max: null
  ttft_rationale: "§6, §18 — first token within product streaming threshold."
  time_to_final_token_p95_ms_max: null
  end_to_end_transaction_p95_ms_max: null
  report_component_latency_attribution:
    - authentication
    - routing
    - retrieval
    - model
    - tool
    - orchestration
    - guardrail
    - post_processing
    - network

# ---------------------------------------------------------------------------
# §7 Throughput & scalability
# ---------------------------------------------------------------------------
throughput_and_scale:
  report_tps: true
  report_rps: true
  report_concurrent_users_or_sessions: true
  report_tokens_per_second: true
  report_queue_depth: true
  report_autoscaling_response_time: true
  max_sustainable_load_before_slo_breach:
    rationale: "§2, §7 — measure highest load before SLO breach; framework gives no default number."
  min_rps_sustained: null
  target_rps: null

# ---------------------------------------------------------------------------
# §8 Infrastructure cost
# ---------------------------------------------------------------------------
infrastructure_cost:
  report_compute_cost_per_transaction: true
  report_gpu_cost_normalized: true
  report_network_cost_per_transaction: true
  report_observability_cost: true
  report_idle_or_waste_signals: true

# ---------------------------------------------------------------------------
# §9 Reliability & availability — measure all metrics in framework table; numeric
# gates below mirror §18 where fixed; otherwise set product thresholds locally.
# ---------------------------------------------------------------------------
reliability:
  monthly_availability_pct_min: 99.9
  monthly_availability_rationale: "§18 — example monthly availability."
  min_workflow_success_rate_pct: null
  min_workflow_success_rationale: "§18 — workflows must meet product-defined success rate under load."
  report_error_rate: true
  report_timeout_rate: true
  report_model_error_rate: true
  report_tool_failure_rate: true
  report_retrieval_failure_rate: true
  report_retry_rate: true
  report_retry_success_rate: true
  report_circuit_breaker_and_fallback: true
  report_mttr_mtbf_and_incidents: true
  max_error_rate_pct: null
  max_timeout_rate_pct: null
  max_model_error_rate_pct: null
  max_tool_failure_rate_pct: null
  max_retrieval_failure_rate_pct: null
  max_retry_rate_pct: null
  min_retry_success_rate_pct: null

# ---------------------------------------------------------------------------
# §10 AI quality — framework requires tracking; set numeric SLOs per product.
# ---------------------------------------------------------------------------
ai_quality:
  report_task_success_rate: true
  report_answer_correctness: true
  report_groundedness: true
  report_hallucination_rate: true
  report_retrieval_precision_recall: true
  report_citation_accuracy_and_faithfulness: true
  report_human_acceptance_and_correction: true
  report_escalation_rate: true
  report_policy_violation_and_guardrail_rates: true
  min_task_success_rate_pct: null
  min_answer_correctness_or_acceptance_rate_pct: null
  min_groundedness_score: null
  max_hallucination_rate_pct: null
  max_human_escalation_rate_pct: null
  report_guardrail_rejection_and_false_pos_neg: true

# ---------------------------------------------------------------------------
# §11 Agentic workflow — coordinator with AgentTool delegation to data, trading,
# execution, and risk analysts (sequential expertise chain).
# ---------------------------------------------------------------------------
agentic_workflow:
  report_steps_per_workflow: true
  report_llm_calls_per_workflow: true
  report_tool_calls_per_workflow: true
  report_failed_tool_calls_per_workflow: true
  report_agent_retry_loops: true
  max_steps_per_workflow: null
  max_llm_calls_per_workflow: null
  max_tool_calls_per_workflow: null
  max_plan_revisions: null
  report_loop_detection: true
  report_workflow_abandonment_rate: true

# ---------------------------------------------------------------------------
# §12 Observability & traceability
# ---------------------------------------------------------------------------
observability:
  min_trace_completeness_pct: 100.0
  trace_rationale: "§18 — production transactions carry trace identifiers."
  capture_prompt_and_model_versions: true
  capture_tool_input_output_where_policy_allows: true
  min_cost_attribution_completeness_pct: 80.0
  cost_attribution_rationale: "§18 — cost mapped to tenant/workflow."
  min_latency_attribution_completeness_pct: null

# ---------------------------------------------------------------------------
# §13 Security, compliance & governance — hard gates where measured
# ---------------------------------------------------------------------------
security_governance:
  tenant_isolation_violations_max: 0
  tenant_isolation_rationale: "§13 required gate — zero violations."
  secrets_exposure_events_max: 0
  guardrail_deterministic_pre_execution_pct_min: 100.0
  guardrail_rationale: "§18 — deterministic policy checks before execution."
  report_pii_detection_and_leakage: true
  report_prompt_injection_and_jailbreak_attempts: true
  min_audit_log_completeness_pct: null

# ---------------------------------------------------------------------------
# §14 Customer & tenant level
# ---------------------------------------------------------------------------
tenant:
  report_cost_per_tenant: true
  report_margin_per_tenant: true
  report_slo_compliance_per_tenant: true
  report_failure_rate_per_tenant: true

# ---------------------------------------------------------------------------
# §16 Instrumentation priority (ordered; instrument in this order first)
# ---------------------------------------------------------------------------
instrumentation_priority:
  - cost_per_transaction
  - cost_per_successful_transaction
  - input_output_total_tokens_per_transaction
  - model_calls_per_transaction
  - tool_calls_per_transaction
  - gb_accessed_per_transaction
  - vector_db_queries_per_transaction
  - p50_p95_p99_latency
  - time_to_first_token
  - workflow_success_rate
  - retry_rate
  - error_rate
  - human_escalation_rate
  - accepted_or_correct_answer_rate
  - cost_by_customer_or_tenant
  - storage_growth_rate
  - gpu_cpu_utilization
  - cache_hit_rate
  - guardrail_rejection_rate
  - gross_margin_per_transaction

# ---------------------------------------------------------------------------
# §17 Recommended dashboard structure — reporting obligations (boolean)
# ---------------------------------------------------------------------------
dashboards:
  executive:
    required: true
    areas: [economics, quality, reliability, performance, scale, customer, risk]
  engineering:
    required: true
    areas: [model_usage, rag, agentic_workflows, platform, reliability, observability]
  operations:
    required: true
    areas: [sla_slo, incidents, support, governance, cost_control]

# ---------------------------------------------------------------------------
# §18 Recommended SLO examples — numeric illustrations taken from the framework table
# (replace with product-defined thresholds where the doc uses "defined threshold").
# ---------------------------------------------------------------------------
recommended_slo_examples:
  availability_monthly_pct_min: 99.9
  p95_response_time_ms_max: null
  p99_response_time_ms_max: null
  time_to_first_token_within_streaming_threshold_ms_p95: null
  workflow_success_rate_pct_min: null
  retrieval_success_rate_pct_min: null
  guardrail_enforcement_pct_min: 100.0
  tenant_isolation_cross_tenant_violations_max: 0
  production_transactions_with_trace_id_pct_min: 100.0
  cost_attribution_completeness_pct_min: 80.0

# ---------------------------------------------------------------------------
# §20 Final recommended metric set — dimensions that must be representable in reports
# ---------------------------------------------------------------------------
balanced_dimensions:
  - cost
  - tokens
  - model
  - data
  - performance
  - scale
  - infrastructure
  - reliability
  - quality
  - agentic
  - governance
  - tenant

# ---------------------------------------------------------------------------
# §21 Summary — evaluation question (informational)
# ---------------------------------------------------------------------------
primary_evaluation_question: >
  How much does it cost to produce a correct, accepted, compliant, and successful
  business outcome under production load? (§21)

# ---------------------------------------------------------------------------
# Application binding: financial-advisor (see README.md, financial_advisor/agent.py)
# ---------------------------------------------------------------------------
application:
  package: financial_advisor
  architecture: coordinator_with_sub_agent_tools
  readme_summary: >-
    Assists human advisors: data analyst (search-driven market reports), trading
    analyst (strategy set), execution analyst (implementation plan), risk analyst
    (risk mitigation). Built-in Google Search; not personalized investment advice
    per README disclaimer.
  interaction_type: conversational
  vertical: financial
  root_agent: financial_coordinator
  reference_model_in_sample: gemini-2.5-pro
  adk_components:
    - LlmAgent
    - AgentTool
  sub_agents:
    - data_analyst_agent
    - trading_analyst_agent
    - execution_analyst_agent
    - risk_analyst_agent
  primary_workload_shape: research_and_advisory_orchestration
  compliance_note: >-
    README requires educational/informational framing; governance SLOs (§13) and
    human-in-the-loop expectations should reflect regulated-domain practice.
  notes:
    - "§4–§5 — search loops dominate tokens and external query cost; attribute by ticker and analyst stage."
    - "§10 — factual grounding and hallucination controls are critical; track unsupported claims in outputs."
    - "§6 — end-to-end advisory latency includes multiple analyst passes; tail latency reflects search depth."
