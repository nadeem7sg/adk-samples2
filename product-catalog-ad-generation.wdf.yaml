apiVersion: wdf.7sg.ai/v2
kind: WorkloadDefinition
metadata:
  name: product-catalog-ad-generation
  description: Google ADK agent 'product-catalog-ad-generation' served on port 8080 (adk web). Deployable
    to GCP Cloud Run via the shared story-teller-gcp-us-central target.
  tags:
    env: dev
  labels:
    app: product-catalog-ad-generation
    framework: google-adk
  annotations:
    sherpa.7sg.ai/origin: adk-samples
  version: 0.1.1
workload:
  source:
    git:
      repoUrl: https://github.com/nadeem7sg/adk-samples2
      ref: main
      path: python/agents/product-catalog-ad-generation
security:
  policies:
    secretsInEnvAllowed: true
secrets:
  provider: external-secrets
  vaults:
  - name: gcp-main
    projectIdRef: gcp-secret-manager-project-id
    tokenRef: gcp-sa-key-json
  secretRefs:
  - name: google-cloud-project
    injectAs: env
    envVar: GOOGLE_CLOUD_PROJECT
    externalRef:
      provider: gcp-secret-manager
      vaultRef: gcp-main
      key: google-cloud-project
  - name: google-cloud-location
    injectAs: env
    envVar: GOOGLE_CLOUD_LOCATION
    externalRef:
      provider: gcp-secret-manager
      vaultRef: gcp-main
      key: google-cloud-location
  - name: google-api-key
    injectAs: env
    envVar: GOOGLE_API_KEY
    externalRef:
      provider: gcp-secret-manager
      vaultRef: gcp-main
      key: google-api-key
  - name: deploy-service-account-key
    injectAs: file
    filePath: /credentials/deploy-sa.json
    externalRef:
      provider: gcp-secret-manager
      vaultRef: gcp-main
      key: deploy-service-account-key
  - name: deploy-service-account-key-json
    injectAs: env
    envVar: GCP_SA_KEY_JSON
    externalRef:
      provider: gcp-secret-manager
      vaultRef: gcp-main
      key: deploy-service-account-key
dataSources:
  inputs: []
  outputs: []
scenarios:
  native:
    description: Google ADK agent 'product-catalog-ad-generation' served on port 8080 (adk web). Deployable
      to GCP Cloud Run via the shared story-teller-gcp-us-central target.
    topology:
      components:
      - name: product-catalog-ad-generation-service
        role: api
        runtime:
          platform: serverless
          regions:
          - us-central1
          image:
            repository: product-catalog-ad-generation
            tag: latest
          env:
          - name: GOOGLE_GENAI_USE_VERTEXAI
            value: 'true'
          envFromSecretRefs:
          - google-cloud-project
          - google-cloud-location
          resources:
            cpu: '1'
            memory: 2Gi
          autoscaling:
            minReplicas: 1
            maxReplicas: 5
            policy:
              metric: cpu
              target: 70
        endpoints:
        - name: http
          port: 8080
          exposure: public
          protocol: http
          path: /
    deployments:
    - name: product-catalog-ad-generation-gcp-us-central
      target:
        provider: gcp
        region: us-central1
        tdfRef: story-teller-gcp-us-central
      components:
      - product-catalog-ad-generation-service
  alternates:
  - name: local-dev
    description: Local development using a Gemini API key (no Vertex AI).
    topology:
      components:
      - name: product-catalog-ad-generation-service
        role: api
        runtime:
          platform: custom
          regions:
          - local
          image:
            repository: product-catalog-ad-generation
            tag: dev
          env:
          - name: GOOGLE_GENAI_USE_VERTEXAI
            value: 'false'
          envFromSecretRefs:
          - google-api-key
          resources:
            cpu: '1'
            memory: 1Gi
          autoscaling:
            minReplicas: 1
            maxReplicas: 1
        endpoints:
        - name: http
          port: 8080
          exposure: public
          protocol: http
          path: /
    deployments:
    - name: local
      target:
        provider: onprem
        region: local
      components:
      - product-catalog-ad-generation-service
