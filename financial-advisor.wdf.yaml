apiVersion: wdf.7sg.ai/v2
kind: WorkloadDefinition
metadata:
  name: financial-advisor
  description: >
    Multi-agent financial advisory system built with Google ADK. A
    financial coordinator (Gemini 2.5 Pro) orchestrates four specialist
    sub-agents via AgentTool: data analyst (market data + Google Search),
    trading analyst (strategy formulation), execution analyst (execution
    planning), and risk analyst (risk evaluation). Each sub-agent uses
    Google Search for real-time grounding. Exposes an ADK web UI on
    port 8080.
  tags:
    env: dev
  labels:
    app: financial-advisor
    framework: google-adk
  annotations:
    sherpa.7sg.ai/origin: adk-samples
  version: "0.1.0"

workload:
  source:
    git:
      repoUrl: https://github.com/nadeem7sg/adk-samples2
      ref: main
      path: python/agents/financial-advisor

security:
  policies:
    secretsInEnvAllowed: true

secrets:
  provider: external-secrets
  vaults:
    - name: gcp-main
      projectIdRef: gcp-secret-manager-project-id
      tokenRef: gcp-sa-key-json
    - name: internal-org-vault
      addressRef: vault-address
      tokenRef: vault-token
  secretRefs:
    - name: google-cloud-project
      injectAs: env
      envVar: GOOGLE_CLOUD_PROJECT
      externalRef:
        provider: vault
        vaultRef: internal-org-vault
        key: secret/financial-advisor/gcp/project
    - name: google-cloud-location
      injectAs: env
      envVar: GOOGLE_CLOUD_LOCATION
      externalRef:
        provider: vault
        vaultRef: internal-org-vault
        key: secret/financial-advisor/gcp/location
    - name: google-api-key
      injectAs: env
      envVar: GOOGLE_API_KEY
      externalRef:
        provider: vault
        vaultRef: internal-org-vault
        key: secret/financial-advisor/gcp/api-key
    - name: deploy-service-account-key
      injectAs: file
      filePath: /credentials/deploy-sa.json
      externalRef:
        provider: gcp-secret-manager
        vaultRef: gcp-main
        key: deploy-service-account-key
    - name: deploy-service-account-key-json
      injectAs: env
      envVar: GCP_SA_KEY_JSON
      externalRef:
        provider: gcp-secret-manager
        vaultRef: gcp-main
        key: deploy-service-account-key

dataSources:
  inputs:
    - name: google-search
      description: Built-in Google Search used by all sub-agents for real-time market data, news, and financial information
  outputs: []

scenarios:
  native:
    description: >
      GCP-native deployment: containerised ADK agent on Cloud Run with
      Vertex AI Gemini 2.5 Pro as the coordinator and sub-agent model.
      Google Search for real-time financial data grounding.
    topology:
      components:
        - name: financial-advisor-service
          role: api
          runtime:
            platform: serverless
            regions:
              - us-central1
            image:
              repository: financial-advisor
              tag: latest
            env:
              - name: GOOGLE_GENAI_USE_VERTEXAI
                value: "true"
            envFromSecretRefs:
              - google-cloud-project
              - google-cloud-location
            resources:
              cpu: "2"
              memory: 2Gi
            autoscaling:
              minReplicas: 1
              maxReplicas: 5
              policy:
                metric: cpu
                target: 70
          endpoints:
            - name: http
              port: 8080
              exposure: public
              protocol: http
              path: /
    deployments:
      - name: financial-advisor-gcp-us-central
        target:
          provider: gcp
          region: us-central1
          tdfRef: financial-advisor-gcp-us-central
        components:
          - financial-advisor-service

  alternates:
    - name: local-dev
      description: >
        Local development using Gemini API key (no Vertex AI). Runs via
        uv/ADK CLI on the developer machine.
      topology:
        components:
          - name: financial-advisor-service
            role: api
            runtime:
              platform: custom
              regions:
                - local
              image:
                repository: financial-advisor
                tag: dev
              env:
                - name: GOOGLE_GENAI_USE_VERTEXAI
                  value: "false"
              envFromSecretRefs:
                - google-api-key
              resources:
                cpu: "1"
                memory: 1Gi
              autoscaling:
                minReplicas: 1
                maxReplicas: 1
            endpoints:
              - name: http
                port: 8080
                exposure: public
                protocol: http
                path: /
      deployments:
        - name: local
          target:
            provider: onprem
            region: local
          components:
            - financial-advisor-service
