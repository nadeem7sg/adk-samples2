apiVersion: tdf.7sg.ai/v1
kind: TargetDefinition
metadata:
  name: sail-researcher-gcp-us-central
  displayName: GCP US Central — Cloud Run + Gemini + Maps
  description: >
    GCP target for the Sail Researcher ADK agent. Cloud Run hosts the Go HTTP
    service; Gemini API supplies all LLM agents; Google Maps Platform powers
    Places and geocoding tools; Secret Manager holds runtime credentials;
    Cloud Trace and Cloud Logging provide observability.
  version: "1.0.0"
  tags:
    provider: gcp
    geo: us
    tier: native
target:
  provider: gcp
  regions:
    - us-central1
  geography:
    continent: na
    country: us
    metro: iowa
  networking:
    defaultNetworkPolicy: public
  services:
    - name: cloud-run
      type: serverless
      providerService: Cloud Run
      defaults:
        project: <gcp-project-id>
        namespace: default
      capabilities:
        supportsOIDCWorkloadIdentity: true
        supportsPrivateEndpoints: true
      quotas:
        maxCPUCores: 8
        maxMemoryGiB: 32
    - name: gemini-api
      type: ml-platform
      providerService: Gemini API (Google AI)
      endpoints:
        api: https://generativelanguage.googleapis.com
      capabilities:
        supportsOIDCWorkloadIdentity: false
      availability:
        slaTier: standard
        supportedRegions:
          - global
    - name: maps-platform
      type: custom
      providerService: Google Maps Platform (Places API)
      endpoints:
        api: https://maps.googleapis.com
      capabilities:
        supportsPrivateEndpoints: false
    - name: secret-manager
      type: secrets
      providerService: Secret Manager
      capabilities:
        supportsPrivateEndpoints: true
    - name: artifact-registry
      type: custom
      providerService: Artifact Registry
      defaults:
        project: <gcp-project-id>
      endpoints:
        registry: us-central1-docker.pkg.dev
    - name: cloud-logging
      type: observability
      providerService: Cloud Logging + Cloud Monitoring
    - name: cloud-trace
      type: observability
      providerService: Cloud Trace
      capabilities:
        supportsOIDCWorkloadIdentity: true
    - name: iam
      type: identity
      providerService: IAM + Workload Identity
  infrastructure:
    clusters: []
    secretStores:
      - name: gcp-secret-manager
        service: secret-manager
